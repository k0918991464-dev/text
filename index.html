<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>可愛番茄鐘</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }
    * {
      font-family: 'Nunito', sans-serif;
    }
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-5px) rotate(2deg); }
      75% { transform: translateY(5px) rotate(-2deg); }
    }
    .bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }
    .wiggle { animation: wiggle 0.5s ease-in-out infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .pulse-ring {
      animation: pulse-ring 1s ease-out infinite;
    }
    .timer-circle {
      filter: drop-shadow(0 10px 20px rgba(255, 107, 107, 0.3));
    }
    .btn-cute {
      transition: all 0.2s ease;
      transform: scale(1);
    }
    .btn-cute:hover {
      transform: scale(1.05);
    }
    .btn-cute:active {
      transform: scale(0.95);
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: linear-gradient(135deg, #fff5f5 0%, #ffe0e6 50%, #ffd4e0 100%);"><!-- 裝飾元素 -->
   <div class="fixed top-10 left-10 text-4xl float" style="animation-delay: 0s;">
    🍅
   </div>
   <div class="fixed top-20 right-16 text-3xl float" style="animation-delay: 0.5s;">
    ✨
   </div>
   <div class="fixed bottom-20 left-16 text-3xl float" style="animation-delay: 1s;">
    🌸
   </div>
   <div class="fixed bottom-32 right-10 text-4xl float" style="animation-delay: 1.5s;">
    🍅
   </div>
   <div class="min-h-full flex flex-col items-center justify-center p-6"><!-- 標題 -->
    <div class="text-center mb-8">
     <h1 id="main-title" class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-400 to-orange-400 mb-2 bounce-slow">🍅 可愛番茄鐘 🍅</h1>
     <p class="text-pink-400 font-semibold">專注工作，快樂休息！</p>
    </div><!-- 時間設定區 -->
    <div id="setup-area" class="bg-white/70 backdrop-blur-sm rounded-3xl p-6 mb-8 shadow-xl border-2 border-pink-200">
     <h2 class="text-lg font-bold text-pink-500 mb-4 text-center">⏰ 設定倒數時間</h2>
     <div class="flex items-center gap-4 justify-center flex-wrap">
      <div class="flex flex-col items-center"><label class="text-sm text-pink-400 font-semibold mb-1">分鐘</label> <input type="number" id="minutes-input" value="25" min="0" max="99" class="w-20 h-12 text-center text-2xl font-bold text-pink-600 bg-pink-50 border-2 border-pink-300 rounded-xl focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-200">
      </div><span class="text-3xl font-bold text-pink-400 mt-4">:</span>
      <div class="flex flex-col items-center"><label class="text-sm text-pink-400 font-semibold mb-1">秒鐘</label> <input type="number" id="seconds-input" value="0" min="0" max="59" class="w-20 h-12 text-center text-2xl font-bold text-pink-600 bg-pink-50 border-2 border-pink-300 rounded-xl focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-200">
      </div>
     </div><!-- 快速選擇按鈕 -->
     <div class="flex gap-2 mt-4 justify-center flex-wrap"><button onclick="setQuickTime(5, 0)" class="px-3 py-1 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-full text-sm font-semibold transition-colors">5分鐘</button> <button onclick="setQuickTime(15, 0)" class="px-3 py-1 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-full text-sm font-semibold transition-colors">15分鐘</button> <button onclick="setQuickTime(25, 0)" class="px-3 py-1 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-full text-sm font-semibold transition-colors">25分鐘</button> <button onclick="setQuickTime(45, 0)" class="px-3 py-1 bg-pink-100 hover:bg-pink-200 text-pink-600 rounded-full text-sm font-semibold transition-colors">45分鐘</button>
     </div>
    </div><!-- 計時器顯示 -->
    <div class="relative mb-8"><!-- 脈衝環效果 -->
     <div id="pulse-effect" class="absolute inset-0 rounded-full bg-pink-300 opacity-0"></div><!-- 主計時器圓圈 -->
     <div class="timer-circle relative w-64 h-64 md:w-72 md:h-72 rounded-full bg-gradient-to-br from-pink-400 via-red-400 to-orange-400 p-2 shadow-2xl">
      <div class="w-full h-full rounded-full bg-white flex flex-col items-center justify-center"><!-- 番茄表情 -->
       <div id="tomato-face" class="text-5xl mb-2">
        😊
       </div><!-- 時間顯示 -->
       <div id="timer-display" class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-red-500">
        25:00
       </div><!-- 狀態文字 -->
       <div id="status-text" class="text-pink-400 font-semibold mt-2">
        準備開始！
       </div>
      </div>
     </div><!-- 進度環 -->
     <svg class="absolute inset-0 w-full h-full -rotate-90" viewbox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="#fecdd3" stroke-width="3" /> <circle id="progress-ring" cx="50" cy="50" r="46" fill="none" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="0" /> <defs>
       <lineargradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#f472b6" />
        <stop offset="100%" style="stop-color:#fb923c" />
       </lineargradient>
      </defs>
     </svg>
    </div><!-- 控制按鈕 -->
    <div class="flex gap-4 mb-8 flex-wrap justify-center"><button id="start-btn" onclick="startTimer()" class="btn-cute px-8 py-4 bg-gradient-to-r from-green-400 to-emerald-500 text-white font-bold text-lg rounded-2xl shadow-lg hover:shadow-xl"> ▶️ 開始 </button> <button id="pause-btn" onclick="pauseTimer()" class="btn-cute px-8 py-4 bg-gradient-to-r from-yellow-400 to-orange-400 text-white font-bold text-lg rounded-2xl shadow-lg hover:shadow-xl hidden"> ⏸️ 暫停 </button> <button id="resume-btn" onclick="resumeTimer()" class="btn-cute px-8 py-4 bg-gradient-to-r from-blue-400 to-cyan-500 text-white font-bold text-lg rounded-2xl shadow-lg hover:shadow-xl hidden"> ▶️ 繼續 </button> <button onclick="resetTimer()" class="btn-cute px-8 py-4 bg-gradient-to-r from-gray-400 to-gray-500 text-white font-bold text-lg rounded-2xl shadow-lg hover:shadow-xl"> 🔄 重設 </button>
    </div><!-- 音效播放器 -->
    <audio id="bell-audio" src="clockrings.mp3" preload="auto"></audio><!-- 鈴聲控制按鈕 -->
    <div id="sound-control" class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 shadow-lg border-2 border-pink-200 hidden">
     <div class="flex items-center gap-4"><span class="text-2xl">🔔</span> <span class="text-pink-600 font-bold">下課鐘響了！</span> <button onclick="stopSound()" class="btn-cute px-4 py-2 bg-gradient-to-r from-red-400 to-pink-500 text-white font-bold rounded-xl shadow-md"> ⏹️ 停止鈴聲 </button>
     </div>
    </div><!-- 完成訊息 -->
    <div id="complete-message" class="hidden text-center mt-4">
     <div class="text-6xl mb-4 wiggle">
      🎉
     </div>
     <p class="text-2xl font-bold text-pink-500">太棒了！你完成了！</p>
     <p class="text-pink-400">休息一下吧～</p>
    </div>
   </div>
  </div>
  <script>
    // 配置
    const defaultConfig = {
      timer_title: '🍅 可愛番茄鐘 🍅'
    };

    let config = { ...defaultConfig };
    
    // 計時器狀態
    let totalSeconds = 25 * 60;
    let remainingSeconds = totalSeconds;
    let timerInterval = null;
    let isRunning = false;
    let isPlaying = false;

    // 初始化 SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (newConfig) => {
          config = { ...defaultConfig, ...newConfig };
          updateUI();
        },
        mapToCapabilities: (cfg) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ['timer_title', cfg.timer_title || defaultConfig.timer_title]
        ])
      });
    }

    function updateUI() {
      document.getElementById('main-title').textContent = config.timer_title || defaultConfig.timer_title;
    }

    // 快速設定時間
    function setQuickTime(minutes, seconds) {
      document.getElementById('minutes-input').value = minutes;
      document.getElementById('seconds-input').value = seconds;
    }

    // 格式化時間
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 更新顯示
    function updateDisplay() {
      document.getElementById('timer-display').textContent = formatTime(remainingSeconds);
      
      // 更新進度環
      const progress = (totalSeconds - remainingSeconds) / totalSeconds;
      const circumference = 289;
      const offset = circumference * (1 - progress);
      document.getElementById('progress-ring').style.strokeDashoffset = offset;
      
      // 更新番茄表情
      const face = document.getElementById('tomato-face');
      if (remainingSeconds === 0) {
        face.textContent = '🥳';
      } else if (remainingSeconds < totalSeconds * 0.25) {
        face.textContent = '😤';
      } else if (remainingSeconds < totalSeconds * 0.5) {
        face.textContent = '😊';
      } else {
        face.textContent = '😌';
      }
    }

    // 開始計時
    function startTimer() {
      const minutes = parseInt(document.getElementById('minutes-input').value) || 0;
      const seconds = parseInt(document.getElementById('seconds-input').value) || 0;
      
      totalSeconds = minutes * 60 + seconds;
      if (totalSeconds <= 0) {
        document.getElementById('status-text').textContent = '請設定時間！';
        return;
      }
      
      remainingSeconds = totalSeconds;
      isRunning = true;
      
      document.getElementById('setup-area').classList.add('opacity-50', 'pointer-events-none');
      document.getElementById('start-btn').classList.add('hidden');
      document.getElementById('pause-btn').classList.remove('hidden');
      document.getElementById('resume-btn').classList.add('hidden');
      document.getElementById('status-text').textContent = '專注中...加油！💪';
      document.getElementById('complete-message').classList.add('hidden');
      document.getElementById('sound-control').classList.add('hidden');
      
      updateDisplay();
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          // 最後 10 秒提示
          if (remainingSeconds <= 10 && remainingSeconds > 0) {
            document.getElementById('status-text').textContent = `還剩 ${remainingSeconds} 秒！`;
          }
        } else {
          timerComplete();
        }
      }, 1000);
    }

    // 暫停計時
    function pauseTimer() {
      isRunning = false;
      clearInterval(timerInterval);
      
      document.getElementById('pause-btn').classList.add('hidden');
      document.getElementById('resume-btn').classList.remove('hidden');
      document.getElementById('status-text').textContent = '已暫停 ⏸️';
    }

    // 繼續計時
    function resumeTimer() {
      isRunning = true;
      
      document.getElementById('pause-btn').classList.remove('hidden');
      document.getElementById('resume-btn').classList.add('hidden');
      document.getElementById('status-text').textContent = '繼續專注！💪';
      
      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
          
          if (remainingSeconds <= 10 && remainingSeconds > 0) {
            document.getElementById('status-text').textContent = `還剩 ${remainingSeconds} 秒！`;
          }
        } else {
          timerComplete();
        }
      }, 1000);
    }

    // 重設計時
    function resetTimer() {
      isRunning = false;
      clearInterval(timerInterval);
      stopSound();
      
      const minutes = parseInt(document.getElementById('minutes-input').value) || 25;
      const seconds = parseInt(document.getElementById('seconds-input').value) || 0;
      totalSeconds = minutes * 60 + seconds;
      remainingSeconds = totalSeconds;
      
      document.getElementById('setup-area').classList.remove('opacity-50', 'pointer-events-none');
      document.getElementById('start-btn').classList.remove('hidden');
      document.getElementById('pause-btn').classList.add('hidden');
      document.getElementById('resume-btn').classList.add('hidden');
      document.getElementById('status-text').textContent = '準備開始！';
      document.getElementById('complete-message').classList.add('hidden');
      document.getElementById('sound-control').classList.add('hidden');
      document.getElementById('tomato-face').textContent = '😊';
      
      updateDisplay();
    }

    // 計時完成
    function timerComplete() {
      clearInterval(timerInterval);
      isRunning = false;
      
      document.getElementById('pause-btn').classList.add('hidden');
      document.getElementById('resume-btn').classList.add('hidden');
      document.getElementById('start-btn').classList.remove('hidden');
      document.getElementById('status-text').textContent = '完成啦！🎊';
      document.getElementById('complete-message').classList.remove('hidden');
      document.getElementById('sound-control').classList.remove('hidden');
      document.getElementById('setup-area').classList.remove('opacity-50', 'pointer-events-none');
      
      // 播放脈衝效果
      const pulse = document.getElementById('pulse-effect');
      pulse.classList.add('pulse-ring');
      pulse.style.opacity = '0.5';
      setTimeout(() => {
        pulse.classList.remove('pulse-ring');
        pulse.style.opacity = '0';
      }, 3000);
      
      // 播放下課鐘聲
      playSchoolBell();
    }

    // 播放下課鐘聲音效
    function playSchoolBell() {
      if (isPlaying) return;
      
      isPlaying = true;
      
      const audio = document.getElementById('bell-audio');
      audio.loop = true;
      audio.play().catch(error => {
        console.error('無法播放音效:', error);
      });
    }

    // 停止音效播放
    function stopSound() {
      isPlaying = false;
      
      const audio = document.getElementById('bell-audio');
      audio.pause();
      audio.currentTime = 0;
      
      document.getElementById('sound-control').classList.add('hidden');
    }

    // 初始化顯示
    updateDisplay();
    updateUI();
  </script>
